<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}"> <head>
    <title>Cập nhật khóa học - EDU-PATH</title>
</head>
<body>

<div layout:fragment="content">
    <h2 style="color: #2c3e50; margin-bottom: 20px;">Cập nhật thông tin khóa học</h2>

    <form th:action="@{/course/update}" th:object="${course}" method="post"
          style="max-width: 500px; background: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1);">

        <div style="margin-bottom: 15px;">
            <label>Mã khóa học:</label>
            <input type="text" th:field="*{courseCode}" readonly
                   style="background: #eee; cursor: not-allowed; border: 1px solid #ccc; width: 100%; padding: 8px; border-radius: 4px;">
        </div>

        <div style="margin-bottom: 15px;">
            <label>Tên khóa học:</label>
            <input type="text" th:field="*{courseName}" readonly
                   style="background: #eee; cursor: not-allowed; border: 1px solid #ccc; width: 100%; padding: 8px; border-radius: 4px;">
        </div>

        <div style="margin-bottom: 15px;">
            <label style="display: block; font-weight: bold;">Học phí (VNĐ):</label>
            <input type="number" th:field="*{tuitionFee}" required
                   style="width: 100%; padding: 10px; border: 1px solid #2c3e50; border-radius: 4px;">
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display: block; font-weight: bold;">Ngày khai giảng:</label>
            <input type="date" th:field="*{startDate}" required
                   style="width: 100%; padding: 10px; border: 1px solid #2c3e50; border-radius: 4px;">
        </div>

        <div style="display: flex; gap: 10px;">
            <button type="submit" class="btn" style="background: #27ae60; color: white; border: none; padding: 10px 20px; cursor: pointer;">
                Lưu thay đổi
            </button>
            <a th:href="@{/course/list}" class="btn" style="background: #7f8c8d; color: white; padding: 10px 20px; text-decoration: none;">
                Hủy bỏ
            </a>
        </div>
    </form>
</div>

</body>
</html>
